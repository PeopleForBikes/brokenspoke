name: tools

defaults:
  run:
    working-directory: tools

on:
  pull_request:
    paths:
      - ".github/workflows/tools.yml"
      - "tools/**"
      - "Cargo.toml"
    types:
      - opened
      - synchronize
      - reopened
  push:
    paths:
      - ".github/workflows/tools.yml"
      - "incubator/**"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 #v7.3.1
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Lint
        run: |
          uv tool run isort --check --profile black --fgw 2 .
          uv tool run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 #v7.3.1
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Test
        run: |
          uv run \
            --with pandas \
            --with us \
            --with typer \
            --with xdoctest \
            python -m xdoctest \
            fips.py \
            all

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
