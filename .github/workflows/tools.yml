name: tools

defaults:
  run:
    working-directory: tools

on:
  pull_request:
    paths:
      - ".github/workflows/tools.yml"
      - "tools/**"
      - "Cargo.toml"
    types:
      - opened
      - synchronize
      - reopened
  push:
    paths:
      - ".github/workflows/tools.yml"
      - "incubator/**"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 #v8.2.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Lint
        run: |
          uv tool run isort --check --profile black --fgw 2 .
          uv tool run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 #v8.2.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Test
        run: |
          uv run \
            --with pandas \
            --with us \
            --with typer \
            --with xdoctest \
            python -m xdoctest \
            fips.py \
            all

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
