name: tools

defaults:
  run:
    working-directory: tools

on:
  pull_request:
    paths:
      - ".github/workflows/tools.yml"
      - "tools/**"
      - "Cargo.toml"
    types:
      - opened
      - synchronize
      - reopened
  push:
    paths:
      - ".github/workflows/tools.yml"
      - "incubator/**"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 #v8.3.2
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Lint
        run: |
          uv tool run isort --check --profile black --fgw 2 .
          uv tool run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 #v8.3.2
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Test
        run: |
          uv run \
            --with pandas \
            --with us \
            --with typer \
            --with xdoctest \
            python -m xdoctest \
            fips.py \
            all

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
